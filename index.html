<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PMS PRO - MOBILE OPTIMIZED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; overflow-x: hidden; }
        
        /* Chế độ hiển thị Tab */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease; }
        .nav-btn.active { color: #2563eb; border-bottom: 3px solid #2563eb; font-weight: 900; }
        
        /* Modal Responsive */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { width: 100%; max-width: 500px; background: white; border-radius: 2rem; padding: 2rem; max-height: 90vh; overflow-y: auto; }

        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Timeline Responsive */
        .timeline-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .timeline-slot { position: absolute; height: 32px; top: 4px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; border-left-width: 4px; font-size: 10px; display: flex; align-items: center; padding: 0 5px; color: white; font-weight: bold; overflow: hidden; }

        /* Ẩn thanh cuộn của Menu */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @media (max-width: 640px) {
            .nav-btn { padding: 15px 10px !important; font-size: 9px !important; }
            main { padding: 10px !important; }
            .modal-content { padding: 1.5rem; border-radius: 1.5rem; }
        }
        
        #login-screen { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm">
            <div class="text-center mb-6">
                <div class="bg-blue-600 w-12 h-12 rounded-xl text-white flex items-center justify-center mx-auto mb-2 shadow-lg"><i class="fa-solid fa-bolt text-xl"></i></div>
                <h1 class="font-black text-2xl uppercase italic">PMS LOGIN</h1>
            </div>
            <div class="space-y-4">
                <input type="text" id="login-user" placeholder="Tên đăng nhập" class="w-full bg-slate-100 rounded-2xl p-4 font-bold outline-none border-2 border-transparent focus:border-blue-500">
                <input type="password" id="login-pass" placeholder="Mật khẩu" class="w-full bg-slate-100 rounded-2xl p-4 font-bold outline-none border-2 border-transparent focus:border-blue-500">
                <button onclick="auth.login()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-transform">Đăng nhập</button>
            </div>
            <p class="text-center text-[10px] text-slate-400 mt-4 font-bold italic">ADMIN: admin / 123</p>
        </div>
    </div>

    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm overflow-x-auto no-scrollbar">
        <div class="max-w-[1400px] mx-auto px-4 flex items-center whitespace-nowrap">
            <div class="py-4 flex items-center gap-2 mr-6">
                <div class="bg-blue-600 p-1.5 rounded text-white shadow-lg"><i class="fa-solid fa-bolt"></i></div>
                <span class="font-black text-xl tracking-tighter uppercase italic">PMS</span>
            </div>
            <div class="flex gap-1" id="nav-container">
                <button onclick="ui.switchTab('op')" id="btn-op" class="nav-btn px-3 py-5 text-[10px] font-bold uppercase hidden">Vận hành</button>
                <button onclick="ui.switchTab('bill')" id="btn-bill" class="nav-btn px-3 py-5 text-[10px] font-bold uppercase hidden text-slate-400">Hóa đơn</button>
                <button onclick="ui.switchTab('court')" id="btn-court" class="nav-btn px-3 py-5 text-[10px] font-bold uppercase hidden text-slate-400">Sân</button>
                <button onclick="ui.switchTab('service')" id="btn-service" class="nav-btn px-3 py-5 text-[10px] font-bold uppercase hidden text-slate-400">Dịch vụ</button>
                <button onclick="ui.switchTab('stock')" id="btn-stock" class="nav-btn px-3 py-5 text-[10px] font-bold uppercase hidden text-slate-400">Kho</button>
                <button onclick="ui.switchTab('member')" id="btn-member" class="nav-btn px-3 py-5 text-[10px] font-bold uppercase hidden text-slate-400">Khách</button>
                <button onclick="ui.switchTab('staff')" id="btn-staff" class="nav-btn px-3 py-5 text-[10px] font-bold uppercase hidden text-slate-400">NV</button>
                <button onclick="ui.switchTab('config')" id="btn-config" class="nav-btn px-3 py-5 text-[10px] font-bold uppercase hidden text-slate-400"><i class="fa-solid fa-gear"></i></button>
                <button onclick="location.reload()" class="px-3 py-5 text-[10px] font-bold uppercase text-rose-500"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-4">
        
        <div id="tab-op" class="tab-content">
            <div class="bg-white rounded-[2rem] p-4 md:p-6 border card-shadow mb-6">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                    <div>
                        <h2 class="font-black text-lg uppercase italic">Lịch đặt sân</h2>
                        <input type="date" id="view-date" onchange="app.reloadTimeline()" class="text-[10px] font-bold border-none bg-slate-100 rounded-lg px-2 py-1 mt-1 outline-none">
                    </div>
                    <button onclick="ui.openModal('booking')" class="w-full md:w-auto bg-indigo-600 text-white px-5 py-3 rounded-xl text-[10px] font-black uppercase shadow-lg">+ Đặt trước</button>
                </div>
                <div class="timeline-container">
                    <div class="min-w-[800px] relative pb-4">
                        <div id="timeline-hours-header" class="flex ml-20 mb-2"></div>
                        <div id="timeline-rows" class="space-y-3"></div>
                    </div>
                </div>
            </div>
            <div id="grid-courts" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>

        <div id="tab-staff" class="tab-content">
            <div class="bg-white rounded-[2rem] p-4 md:p-6 border card-shadow">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black text-lg uppercase italic">Nhân viên</h2>
                    <button onclick="ui.openModal('staff')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-md">+ Thêm mới</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left min-w-[500px]">
                        <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400">
                            <tr><th class="p-4">User</th><th class="p-4">Pass</th><th class="p-4">Role</th><th class="p-4 text-right">#</th></tr>
                        </thead>
                        <tbody id="list-staff-table" class="divide-y font-bold text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="tab-bill" class="tab-content"><h2 class="p-10 text-center font-bold text-slate-400 italic">Dữ liệu Hóa đơn...</h2></div>
        <div id="tab-court" class="tab-content"><h2 class="p-10 text-center font-bold text-slate-400 italic">Dữ liệu Sân...</h2></div>
        <div id="tab-service" class="tab-content"><h2 class="p-10 text-center font-bold text-slate-400 italic">Dữ liệu Dịch vụ...</h2></div>
        <div id="tab-stock" class="tab-content"><h2 class="p-10 text-center font-bold text-slate-400 italic">Dữ liệu Kho...</h2></div>
        <div id="tab-member" class="tab-content"><h2 class="p-10 text-center font-bold text-slate-400 italic">Dữ liệu Hội viên...</h2></div>
        <div id="tab-config" class="tab-content"><h2 class="p-10 text-center font-bold text-slate-400 italic">Cấu hình hệ thống...</h2></div>

    </main>

    <div id="modal-staff" class="modal">
        <div class="modal-content">
            <h2 id="st-modal-title" class="font-black text-xl uppercase italic mb-6">Nhân viên</h2>
            <input type="hidden" id="st-id">
            <div class="space-y-4">
                <input id="st-user" type="text" class="w-full bg-slate-100 rounded-2xl p-4 font-bold outline-none" placeholder="Username">
                <input id="st-pass" type="text" class="w-full bg-slate-100 rounded-2xl p-4 font-bold outline-none" placeholder="Password">
                <select id="st-role" class="w-full bg-slate-100 rounded-2xl p-4 font-bold outline-none border-r-8 border-transparent">
                    <option value="Staff">Staff (Chỉ xem lịch & hóa đơn)</option>
                    <option value="Admin">Admin (Toàn quyền)</option>
                </select>
                <button onclick="app.saveStaff()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Lưu lại</button>
                <button onclick="ui.closeModal('staff')" class="w-full text-[10px] font-bold uppercase text-slate-400 mt-2">Đóng</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDHLEhcMPuI6CaC9MGrnAJxSnnZdMZwx8",
            databaseURL: "https://pms-pickleball-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pms-pickleball",
            appId: "1:34607569124:web:85977243452d0549a734f1"
        };
        const db = getDatabase(initializeApp(firebaseConfig));
        let dataCache = { staff: {}, courts: {}, bookings: {}, config: {} };

        // AUTH LOGIC
        window.auth = {
            login: () => {
                const u = document.getElementById('login-user').value.trim();
                const p = document.getElementById('login-pass').value.trim();
                if(u === 'admin' && p === '123') {
                    auth.apply(['op','bill','court','service','stock','member','staff','config']);
                    return;
                }
                const s = Object.values(dataCache.staff).find(x => x.User === u && x.Pass === p);
                if(s) {
                    s.Role === 'Admin' ? auth.apply(['op','bill','court','service','stock','member','staff','config']) : auth.apply(['op','bill']);
                } else {
                    alert("Sai tài khoản!");
                }
            },
            apply: (perms) => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('hidden'));
                perms.forEach(id => { const el = document.getElementById('btn-' + id); if(el) el.classList.remove('hidden'); });
                if(perms.length > 0) ui.switchTab(perms[0]);
                document.getElementById('login-screen').classList.add('hidden');
            }
        };

        window.ui = {
            switchTab: (id) => {
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                const target = document.getElementById('tab-' + id);
                if(target) target.classList.add('active');
                document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('active'); b.classList.add('text-slate-400'); });
                const btn = document.getElementById('btn-' + id);
                if(btn) btn.classList.add('active');
            },
            openModal: (type, id = null) => {
                if(type === 'staff') {
                    const isEdit = id !== null;
                    document.getElementById('st-id').value = id || "";
                    document.getElementById('st-user').value = isEdit ? dataCache.staff[id].User : "";
                    document.getElementById('st-pass').value = isEdit ? dataCache.staff[id].Pass : "";
                    document.getElementById('st-role').value = isEdit ? dataCache.staff[id].Role : "Staff";
                }
                document.getElementById('modal-' + type).classList.add('active');
            },
            closeModal: (type) => document.getElementById('modal-' + type).classList.remove('active')
        };

        window.app = {
            saveStaff: () => {
                const id = document.getElementById('st-id').value || 'ST' + Date.now();
                const user = document.getElementById('st-user').value.trim();
                const pass = document.getElementById('st-pass').value.trim();
                const role = document.getElementById('st-role').value;
                if(!user || !pass) return alert("Điền đủ thông tin!");
                update(ref(db, 'staff/' + id), { User: user, Pass: pass, Role: role }).then(() => ui.closeModal('staff'));
            },
            deleteItem: (path) => { if(confirm("Xóa mục này?")) remove(ref(db, path)); },
            reloadTimeline: () => { /* Logic Timeline cũ của bạn */ }
        };

        // LISTEN STAFF
        onValue(ref(db, 'staff'), (s) => {
            dataCache.staff = s.val() || {};
            let h = '';
            for (let id in dataCache.staff) {
                const v = dataCache.staff[id];
                h += `<tr><td class="p-4">${v.User}</td><td class="p-4">${v.Pass}</td><td class="p-4"><span class="px-2 py-0.5 rounded text-[9px] ${v.Role==='Admin'?'bg-purple-100 text-purple-600':'bg-blue-100 text-blue-600'}">${v.Role}</span></td><td class="p-4 text-right"><button onclick="ui.openModal('staff','${id}')" class="text-blue-500 mr-3"><i class="fa-solid fa-pen"></i></button><button onclick="app.deleteItem('staff/${id}')" class="text-red-300"><i class="fa-solid fa-trash"></i></button></td></tr>`;
            }
            document.getElementById('list-staff-table').innerHTML = h;
        });

        // BẠN HÃY COPY CÁC PHẦN LISTEN DỮ LIỆU CÒN LẠI TỪ FILE CŨ VÀO ĐÂY (Courts, Bookings, Bills...)
    </script>
</body>
</html>
